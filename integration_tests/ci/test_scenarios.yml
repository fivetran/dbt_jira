# Only set if not using default adapter ranges
dbt_adapter_versions:
  snowflake: ">=1.3.0,<1.11.5"
#   bigquery: ">=1.3.0,<2.0.0"
#   postgres: ">=1.3.0,<2.0.0"
#   redshift: ">=1.3.0,<2.0.0"
#   databricks: ">=1.6.0,<2.0.0"

schema_variable_name: "jira_schema"

include_databricks_sql: true
include_sqlserver: false
include_dbt_compile: true

test_scenarios:
  - name: "Default"
    vars: {}
    include_incremental: true

  - name: "features disabled field grain"
    vars:
      jira_using_teams: false
      jira_using_priorities: false
      jira_using_sprints: false
      jira_using_components: false
      jira_using_versions: false
      jira_field_grain: 'field_name'
    include_incremental: true

  # Redshift is false by default
  - name: "conversations disabled"
    vars:
      jira_include_conversations: false
    include_incremental: false
    warehouses: ["snowflake", "bigquery", "postgres", "databricks"]

  - name: "MDLS"
    vars:
      fivetran_using_source_casing: true
    include_incremental: false
    include_dbt_seed: true
